# Blueprint de Render: crea la API del portal con un clic (plan free).
services:
  - type: web
    name: aa-portal-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: DB_HOST
        value: gateway01.us-west-2.prod.aws.tidbcloud.com
      - key: DB_PORT
        value: "4000"
      - key: DB_NAME
        value: aa_portal
      - key: DB_SSL
        value: "true"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://portal.alvaroalabart.es
