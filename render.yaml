# Blueprint de Render: crea la API del portal con un clic (plan free).
services:
  - type: web
    name: aa-portal-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: DB_HOST
        value: gateway01.us-west-2.prod.aws.tidbcloud.com
      - key: DB_PORT
        value: "4000"
      - key: DB_NAME
        value: aa_portal
      - key: DB_SSL
        value: "true"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://portal.alvaroalabart.es
      - key: SELF_PING_URL
        value: https://aa-portal-api.onrender.com/api/health
      - key: SMTP_HOST
        value: com1029.raiolanetworks.es
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: VAPID_PUBLIC_KEY
        value: BAbZ80TW5Jjnm_vlQ9NkoGJ1Hn92x8AwR9HizgPPEcSWuE5H8Yq4b3awBHcHMlXqH7T1olF4ETVrS1LrAgMPdtw
      - key: VAPID_SUBJECT
        value: mailto:hola@alvaroalabart.es
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
