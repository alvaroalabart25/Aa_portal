name: Deploy a Raiola

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        working-directory: client
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: |
          npm ci
          npm run build
          cat > dist/.htaccess <<'EOF'
          RewriteEngine On
          RewriteBase /
          RewriteCond %{REQUEST_URI} !^/api
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule . /index.html [L]
          EOF

      # La API se despliega sola en Render con cada push (ver render.yaml).

      - name: Subir frontend (FTPS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: client/dist/
          server-dir: portal.alvaroalabart.es/
          state-name: .ftp-deploy-state.json

      - name: Verificar producción
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 https://portal.alvaroalabart.es/ || true)
          echo "Front -> HTTP $code"
