name: Despertador API

# Mantiene despierta la API de Render (free tier se duerme a los ~15 min).
# Horario España: despierta 6:00-1:00, siesta 1:00-6:00.
# Los cron de GitHub van en UTC: 4:00-22:59 UTC = 6:00-0:59 en verano (CEST).
# (En invierno se desplaza 1h: 5:00-23:59 CET. Ajustar a "5-23" en octubre si molesta.)
on:
  schedule:
    - cron: '*/10 4-22 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping /api/health
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 --retry 2 https://aa-portal-api.onrender.com/api/health)
          echo "API respondió HTTP $code"
          [ "$code" = "200" ] || exit 1
