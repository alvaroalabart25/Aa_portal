name: Despertador API

# La API se mantiene despierta SOLA (self-ping interno cada 10 min, con siesta
# 1:00-6:00 hora de Madrid — ver server/src/index.ts). Este workflow es:
#   1) La alarma de las 6:00: el primer ping que la despierta tras la siesta.
#   2) Red de seguridad horaria por si el self-ping fallara.
# Los cron de GitHub van en UTC y son "best effort" (pueden retrasarse).
on:
  schedule:
    - cron: '0 4 * * *' # alarma 6:00 en verano (CEST)
    - cron: '0 5 * * *' # alarma 6:00 en invierno (CET); en verano cae a las 7:00, inofensivo
    - cron: '7 5-22 * * *' # red de seguridad: un ping por hora durante el día
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping /api/health
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 --retry 2 https://aa-portal-api.onrender.com/api/health)
          echo "API respondió HTTP $code"
          [ "$code" = "200" ] || exit 1
